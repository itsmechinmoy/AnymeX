name: Notify Release

on:
  workflow_run:
    workflows:
      - "changelog"
    types:
      - completed
  workflow_dispatch:

jobs:
  notify:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests jq

      - name: Fetch Repository Tags
        id: fetch_tags
        run: |
          curl -s "https://api.github.com/repos/RyanYuuki/AnymeX/tags" -o tags.json
          TAGS=$(jq -r '.[].name' tags.json | sort -V)
          LATEST_TAG=$(echo "$TAGS" | tail -n 1)
          echo "Latest Tag: $LATEST_TAG"
          echo "LATEST_TAG=$LATEST_TAG" >> $GITHUB_ENV

      - name: Get Release Info
        id: release_info
        run: |
          curl -s "https://api.github.com/repos/RyanYuuki/AnymeX/releases/tags/${{ env.LATEST_TAG }}" -o release.json
          
          # Format release notes with proper line breaks and commit-like styling
          RELEASE_NOTES=$(jq -r '.body' release.json | sed -E 's/^/● /g; s/$/\n/g')
          
          RELEASE_NAME=$(jq -r '.name // "No release name"' release.json)
          ASSET_URLS=$(jq -r '.assets[]?.browser_download_url // empty' release.json)
          
          echo "RELEASE_NAME=${RELEASE_NAME}" >> $GITHUB_ENV
          echo "RELEASE_NOTES=${RELEASE_NOTES}" >> $GITHUB_ENV
          echo "${ASSET_URLS}" > assets.txt

      - name: Determine Webhook
        id: determine_webhook
        run: |
          if [[ "${RELEASE_NAME}" == *alpha ]]; then
            echo "DISCORD_WEBHOOK_URL=${{ secrets.DISCORD_WEBHOOK_ALPHA }}" >> $GITHUB_ENV
            echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_ALPHA_CHAT_ID }}" >> $GITHUB_ENV
            echo "ROLE_MENTION=<@&1225347048321191996>" >> $GITHUB_ENV
          else
            echo "DISCORD_WEBHOOK_URL=${{ secrets.DISCORD_WEBHOOK_BETA }}" >> $GITHUB_ENV
            echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_BETA_CHAT_ID }}" >> $GITHUB_ENV
            echo "ROLE_MENTION=<@&1313346791479054456>" >> $GITHUB_ENV
          fi

      - name: Send Release Notes to Telegram
        run: |
          FORMATTED_NOTES=$(echo "${{ env.RELEASE_NOTES }}" | sed 's/$/\\n/g' | tr -d '\n')
          MESSAGE="🚀 <b>New Release: ${RELEASE_NAME}</b>\n\n<b>Changelog:</b>\n${FORMATTED_NOTES}"
          
          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\": \"${{ env.TELEGRAM_CHAT_ID }}\", \"text\": \"$MESSAGE\", \"parse_mode\": \"HTML\"}"

      - name: Send Release Notes to Discord
        run: |
          # Prepare Discord payload with rich embed
          DISCORD_DATA=$(jq -n \
            --arg title "New Release: $RELEASE_NAME" \
            --arg description "${{ env.RELEASE_NOTES }}" \
            --arg color "5814783" \
            --arg role_mention "${{ env.ROLE_MENTION }}" \
            '{
              "content": $role_mention,
              "embeds": [{
                "title": $title,
                "description": $description,
                "color": 5814783,
                "footer": {
                  "text": "AnymeX Release"
                }
              }]
            }')

          curl -X POST "${{ env.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "$DISCORD_DATA"

      - name: Send Assets to Telegram
        run: |
          ASSET_LINKS=""
          while IFS= read -r ASSET_URL; do
            FILE_NAME=$(basename "$ASSET_URL")
            ASSET_LINKS="$ASSET_LINKS\n[📦 Download $FILE_NAME]($ASSET_URL)"
          done < assets.txt
          
          MESSAGE="🚀 <b>Release Assets: ${RELEASE_NAME}</b>${ASSET_LINKS}"
          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\": \"${{ env.TELEGRAM_CHAT_ID }}\", \"text\": \"$MESSAGE\", \"parse_mode\": \"HTML\"}"

      - name: Send Assets to Discord
        run: |
          ASSET_LINKS=""
          while IFS= read -r ASSET_URL; do
            FILE_NAME=$(basename "$ASSET_URL")
            ASSET_LINKS="$ASSET_LINKS\n[📦 $FILE_NAME]($ASSET_URL)"
          done < assets.txt
          
          DISCORD_DATA=$(jq -n \
            --arg title "Release Assets: $RELEASE_NAME" \
            --arg description "$ASSET_LINKS" \
            '{
              "embeds": [{
                "title": $title,
                "description": $description,
                "color": 3066993
              }]
            }')

          curl -X POST "${{ env.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "$DISCORD_DATA"
